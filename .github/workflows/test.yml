name: Recovery Build

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'MANIFEST_URL (if want to use SSH keys, use git@github.com:XXXXX)'
        required: true
        default: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp'
      MANIFEST_BRANCH:
        description: 'MANIFEST_BRANCH'
        required: true
        default: 'twrp-14'
      DEVICE_TREE_URL:
        description: 'DEVICE_TREE_URL'
        required: true
        default: 'https://github.com/coara-chocomaru/ctl'
      DEVICE_TREE_BRANCH:
        description: 'DEVICE_TREE_BRANCH'
        required: true
        default: 'main'
      DEVICE_PATH:
        description: 'DEVICE_PATH'
        required: true
        default: 'device/benesse/ctl2'
      COMMON_TREE_URL:
        description: 'COMMON_TREE_URL (if no common tree, leave blank)'
        required: false
      COMMON_PATH:
        description: 'COMMON_PATH (if no common tree, leave blank)'
        required: false
      DEVICE_NAME:
        description: 'DEVICE_NAME'
        required: true
        default: 'CTL2'
      MAKEFILE_NAME:
        description: 'MAKEFILE_NAME'
        required: true
        default: 'twrp_CTL2'
      BUILD_TARGET:
        description: 'BUILD_TARGET'
        required: true
        default: 'vendorboot'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Display Run Parameters
      run: |
        echo "::group::User Environment Variables"
        echo "Manifest URL: ${{ github.event.inputs.MANIFEST_URL }}"
        echo "Manifest Branch: ${{ github.event.inputs.MANIFEST_BRANCH }}"
        echo "Device Tree URL: ${{ github.event.inputs.DEVICE_TREE_URL }}"
        echo "Device Tree Branch: ${{ github.event.inputs.DEVICE_TREE_BRANCH }}"
        echo "Device Path: ${{ github.event.inputs.DEVICE_PATH }}"
        echo "Device Name: ${{ github.event.inputs.DEVICE_NAME }}"
        echo "Makefile Name: ${{ github.event.inputs.MAKEFILE_NAME }}"
        echo "Build Target: ${{ github.event.inputs.BUILD_TARGET }}.img"
        echo "::endgroup::"

    - name: Check Out
      uses: actions/checkout@v3

    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    - name: Prepare the environment
      run: |
        sudo apt update
        sudo apt -y upgrade
        sudo apt -y install gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib libc6-dev lib32ncurses-dev x11proto-core-dev libx11-dev tree lib32z-dev libgl1-mesa-dev libxml2-utils xsltproc bc ccache lib32readline-dev lib32z1-dev liblz4-tool libncurses-dev libsdl1.2-dev libwxgtk3.2-dev libxml2 lzop pngcrush schedtool squashfs-tools imagemagick libbz2-dev lzma ncftp qemu-user-static libstdc++-10-dev python3

    - name: Install OpenJDK
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '8'

    - name: Setup SSH Keys
      if: ${{ startsWith(github.event.inputs.MANIFEST_URL, 'git@github.com') }}
      uses: webfactory/ssh-agent@v0.5.4
      with:
          ssh-private-key: |
              ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Install repo
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize repo
      run: |
        mkdir workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
        git config --global user.name "coara-chocomaru"
        git config --global user.email "coarachocomaru@gmail.com"
        repo init --depth=1 -u ${{ github.event.inputs.MANIFEST_URL }} -b ${{ github.event.inputs.MANIFEST_BRANCH }}
      id: pwd

    - name: Setup Local Manifest for Device Tree
      run: |
         mkdir -p .repo/local_manifests
         cat > .repo/local_manifests/roomservice.xml << 'EOF'
          <manifest>
         <project
            name="coara-chocomaru/ctl"
            path="device/benesse/ctl2"
            remote="github"
            revision="main" />
          <project
            name="platform/build/release"
            path="build/release"
            remote="aosp"
            revision="refs/tags/android-14.0.0_r17" />
          </manifest>
         EOF
         cat .repo/local_manifests/roomservice.xml
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}      
    - name: Repo Sync
      run: |
          repo sync -c -j$(nproc --all) --force-sync --optimized-fetch --prune
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      
    - name: Clone common tree
      if: |
        github.event.inputs.COMMON_TREE_URL != null
        && github.event.inputs.COMMON_PATH != null
      run: |
        git clone ${{ github.event.inputs.COMMON_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.COMMON_PATH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Check Build Tree
      uses: haya14busa/action-cond@v1
      id: buildtree
      with:
        cond: ${{ github.event.inputs.MANIFEST_BRANCH == 'twrp-14' || github.event.inputs.MANIFEST_BRANCH == 'twrp-14.1' }}
        if_true: twrp
        if_false: omni

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 12
        
    - name: Dump manifest
      run: |
        echo "===== default.xml ====="
        cat .repo/manifests/default.xml

        echo
        echo "===== release project ====="
        grep -n "build/release" .repo/manifests/default.xml || true

        echo
        echo "===== build projects ====="
        grep -n "path=\"build" .repo/manifests/default.xml || true
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Building recovery
      run: |
        set -e

        echo "========================================"
        echo "Device Tree Check"
        echo "========================================"

        ls -la device/benesse/ctl2/
        echo

        ls -la device/benesse/ctl2/*.mk 2>/dev/null || echo "No .mk files found!"
        echo

        echo "===== AndroidProducts.mk ====="
        cat device/benesse/ctl2/AndroidProducts.mk 2>/dev/null || echo "AndroidProducts.mk not found"
        echo

        echo "===== vendorsetup.sh ====="
        cat device/benesse/ctl2/vendorsetup.sh 2>/dev/null || echo "vendorsetup.sh not found"
        echo

        echo "========================================"
        echo "build/release"
        echo "========================================"

        ls -la build || true
        echo

        ls -la build/release || true
        echo

        find build/release -maxdepth 2 -type f | sort || true
        echo

        echo "===== release_config_map.mk ====="
        cat build/release/release_config_map.mk || true
        echo

        echo "===== build_config ====="
        find build/release/build_config -maxdepth 1 -type f | sort || true
        echo

        echo "===== ap2a.scl ====="
        cat build/release/build_config/ap2a.scl || true
        echo

        echo "========================================"
        echo "Git information"
        echo "========================================"

        if [ -d build/release/.git ]; then
          cd build/release
          git remote -v
          git branch -a
          git rev-parse HEAD
          git log -1 --oneline
          cd ../..
        else
          echo "build/release is not a git repository"
        fi
        echo

        export ALLOW_MISSING_DEPENDENCIES=true
        export TARGET_PRODUCT=twrp_CTL2
        export TARGET_RELEASE=ap2a
        export TARGET_BUILD_VARIANT=eng

        echo "========================================"
        echo "source build/envsetup.sh"
        echo "========================================"

        source build/envsetup.sh

        echo
        echo "========================================"
        echo "Lunch menu"
        echo "========================================"

        print_lunch_menu || true

        echo
        echo "========================================"
        echo "Executing lunch"
        echo "========================================"

        lunch ${{ github.event.inputs.MAKEFILE_NAME }}-ap2a-eng

        echo
        echo "========================================"
        echo "Build"
        echo "========================================"

        make clean
        mka ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}
      
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: workspace/out/target/product/${{ github.event.inputs.DEVICE_NAME }}/vendor_boot.img
        name: ${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          Manifest: ${{ github.event.inputs.MANIFEST_BRANCH }}
          Device: ${{ github.event.inputs.DEVICE_NAME }}
          Target: vendor_boot.img
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
